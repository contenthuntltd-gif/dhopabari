# ============================================================
# Dhopa Bari — nginx site config (Contabo VPS) — HTTPS via Cloudflare
#
# Serves the built Flutter web app as static files. All backend work
# (database, auth, edge functions) happens in Supabase cloud, so this
# server only needs to hand out the compiled front-end.
#
# TLS: the site sits behind Cloudflare (proxied / orange cloud). We use a
# free Cloudflare **Origin Certificate** on this server and set the
# Cloudflare SSL/TLS mode to **Full (strict)** — traffic is encrypted
# end to end (browser→Cloudflare→origin) with no renewal to manage
# (the origin cert is valid ~15 years).
#
# One-time setup:
#   1. Cloudflare dashboard → SSL/TLS → Origin Server → Create Certificate
#      (defaults are fine). Copy the two blocks it shows into:
#        /etc/ssl/cloudflare/dhopabari.pem   (Origin Certificate)
#        /etc/ssl/cloudflare/dhopabari.key   (Private Key)
#        sudo chmod 600 /etc/ssl/cloudflare/dhopabari.key
#   2. sudo cp deploy/nginx-dhopabari.conf /etc/nginx/sites-available/dhopabari
#      sudo ln -sf /etc/nginx/sites-available/dhopabari /etc/nginx/sites-enabled/
#      sudo rm -f /etc/nginx/sites-enabled/default
#      sudo nginx -t && sudo systemctl reload nginx
#   3. Cloudflare → SSL/TLS → Overview → set mode to "Full (strict)"
#      and turn ON "Always Use HTTPS".
# ============================================================

# Redirect any plain HTTP hit to HTTPS (safety net; Cloudflare connects
# to the origin over 443 in Full/strict mode).
server {
    listen 80;
    listen [::]:80;
    server_name dhopabari.bd www.dhopabari.bd;
    return 301 https://$host$request_uri;
}

server {
    # `ssl http2` on the listen line is the widely-compatible form (works on
    # older nginx too; the standalone `http2 on;` directive needs nginx
    # 1.25.1+). HTTP/2 on the origin leg is optional — Cloudflare already
    # serves HTTP/2 to the browser.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name dhopabari.bd www.dhopabari.bd;

    # Cloudflare Origin Certificate (created in the dashboard).
    ssl_certificate     /etc/ssl/cloudflare/dhopabari.pem;
    ssl_certificate_key /etc/ssl/cloudflare/dhopabari.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Where the built app lives (see DEPLOY.md — copy build/web here).
    root /var/www/dhopabari;
    index index.html;

    # Flutter web is a single-page app: every unknown path must fall back
    # to index.html so in-app navigation and refresh-on-a-deep-link work.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The app SHELL has stable filenames (main.dart.js never changes name), so
    # it must NEVER be cached — a new deploy has to be seen immediately. This
    # is exactly what was making Cloudflare keep serving the old app: main.dart.js
    # was cached for 7 days. `no-store` tells Cloudflare + browsers to always
    # refetch it, so every deploy goes live at once with no manual purge.
    location ~* ^/(index\.html|flutter_bootstrap\.js|flutter_service_worker\.js|main\.dart\.js|flutter\.js|version\.json|manifest\.json|AssetManifest[^/]*|FontManifest\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Fingerprinted / immutable assets (hashed names, fonts, wasm) — safe to
    # cache long. These do not gate the app version.
    location ~* \.(?:css|png|jpg|jpeg|gif|svg|woff2?|ttf|otf|wasm)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # gzip for the big main.dart.js
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;

    client_max_body_size 10m;
}
